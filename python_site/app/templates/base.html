<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crop Disease Detector (Python)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('main.dashboard') }}">Crop Disease Detector</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('main.dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path.startswith('/scan') %}active{% endif %}" href="{{ url_for('main.scan') }}">New Scan</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path.startswith('/history') %}active{% endif %}" href="{{ url_for('main.history') }}">History</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path.startswith('/diseases') %}active{% endif %}" href="{{ url_for('main.diseases') }}">Disease Library</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category if category in ['success', 'danger', 'warning', 'info'] else 'secondary' }} mb-2">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
